<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Design Checklist</title>

  <!-- PWA: iPhoneのホーム画面に追加するための設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Checklist"/>
  <meta name="theme-color" content="#080808"/>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#080808;-webkit-text-size-adjust:100%;}
    /* iPhoneノッチ対応 */
    #root{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  </style>

  <!-- React + ReactDOM -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Babel (JSXをブラウザ内でトランスパイル) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const COLOR = { p1:"#FF4D00", p2:"#0057FF", p3:"#00A550", p4:"#8B00FF", p5:"#FFB800" };

const PHASES = [
  { id:1, color:COLOR.p1, label:"Phase 1", range:"Day 1〜45",    theme:"基礎固め＆反復定着" },
  { id:2, color:COLOR.p2, label:"Phase 2", range:"Day 46〜90",   theme:"実力急成長期" },
  { id:3, color:COLOR.p3, label:"Phase 3", range:"Day 91〜135",  theme:"初案件獲得" },
  { id:4, color:COLOR.p4, label:"Phase 4", range:"Day 136〜210", theme:"月収50万への加速" },
  { id:5, color:COLOR.p5, label:"Phase 5", range:"Day 211〜365", theme:"年収1,000万の基盤" },
];

const DAILY_ROUTINE = [
  { id:"r1", time:"0:00〜0:20", label:"想起タイム",    color:"#FFB800", desc:"GoodNotesに新規ページを開く。昨日のノートを見ずに「昨日やったこと」を書き出す。書けなかった箇所を赤ペンで補記。" },
  { id:"r2", time:"0:20〜0:30", label:"確認・補完",    color:"#FF4D00", desc:"昨日のノートと書籍をSplit Viewで開いて抜けていた部分を埋める。" },
  { id:"r3", time:"0:30〜1:50", label:"新規学習・制作", color:"#0057FF", desc:"書籍 or 参考サイト（左）＋GoodNotes（右）のSplit View。気づきは即メモ。80分で必ず区切る。" },
  { id:"r4", time:"1:50〜2:00", label:"今日の記録",    color:"#00A550", desc:"「今日やったこと・気づき・明日確認すること」を3行でGoodNotesに記録。絶対にサボるな。" },
];

const SITES_ALWAYS = [
  { name:"SANKOU!",     url:"sankoudesign.com", icon:"🎨", color:"#FF4D00" },
  { name:"MUUUUU.ORG", url:"muuuuu.org",        icon:"📐", color:"#0057FF" },
  { name:"81-web.com",  url:"81-web.com",        icon:"🗂", color:"#00A550" },
  { name:"WEBCRE8.jp",  url:"webcre8.jp",        icon:"📝", color:"#FF4D00" },
];
const SITES_P2 = [
  { name:"io3000",          url:"io3000.com",        icon:"⭐", color:"#8B00FF" },
  { name:"Web Design Clip", url:"webdesignclip.com", icon:"✂️", color:"#00A550" },
];
const SITES_P3 = [
  { name:"Good Web Design", url:"good-web-design.jp", icon:"🏆", color:"#0057FF" },
];

const PHASE_TASKS = {
  1:["GoodNotesに「近接・整列・反復・コントラスト」と書いてから学習を始める","SANKOU! / MUUUUU.ORG / 81-web.com を20分見てスクショ＋分析メモ","Figmaを30分操作（毎日同じ操作を繰り返す）","参考サイトの分析ノートをGoodNotesに1件以上追加","週2本ペースで模写を進める（Week 3以降）"],
  2:["io3000を毎日見て目を鍛える（10〜20分）","模写 × 週3本ペースで進める（GoodNotes分析ノート必須）","SANKOU!で業種別LP設計パターンを研究","WEBCRE8.jpの解説記事を週1本読んでGoodNotesにまとめる","「ターゲット・課題・解決策・意図」の4点をGoodNotesで図解する"],
  3:["io3000 / Good Web Designでポートフォリオ参考サイトを研究","クラウドワークス・ランサーズのプロフィールを更新","DM営業を今日も送る（週10〜15通ペース）","GoodNotesの営業記録ノートに今日の反応を記録","SANKOU!で同業他社のLP分析・発信ネタに変換"],
  4:["Good Web Designで高単価案件のクオリティ基準を研究","専門領域ノートを更新（GoodNotes）","見積書の根拠をGoodNotesで言語化・ブラッシュアップ","案件の「ヒアリング→提案→制作→納品」テンプレートを反復改善","SANKOU! / 81-web.comで専門ジャンルの最新サイトを分析"],
  5:["チームメンバーへのフィードバックをGoodNotesで言語化","高単価案件のデザイン研究（Good Web Design / io3000）","コンテンツ素材をGoodNotesの発信ネタ帳から発掘・投稿","自分の専門領域で新しい知見を1つ書き出す","案件振り返りノートを更新・次回への改善点を記録"],
};

const WEEKDAY_INFO = {
  0:{ label:"日曜", color:"#555",    task:"SANKOU!・io3000を20分見てGoodNotesにスクショ＋分析メモ。翌週タスクを確認して心構えを作る。" },
  1:{ label:"月曜", color:"#0057FF", task:"2時間ルーティン厳守。想起20分＋確認10分＋学習制作80分。順番を変えるな。" },
  2:{ label:"火曜", color:"#0057FF", task:"2時間ルーティン厳守。想起20分＋確認10分＋学習制作80分。順番を変えるな。" },
  3:{ label:"水曜", color:"#0057FF", task:"2時間ルーティン厳守。想起20分＋確認10分＋学習制作80分。順番を変えるな。" },
  4:{ label:"木曜", color:"#0057FF", task:"2時間ルーティン厳守。想起20分＋確認10分＋学習制作80分。順番を変えるな。" },
  5:{ label:"金曜", color:"#0057FF", task:"2時間ルーティン厳守。想起20分＋確認10分＋学習制作80分。順番を変えるな。" },
  6:{ label:"土曜", color:"#00A550", task:"週次まとめ＋GoodNotesの整理。その週のノートを見返して発信ネタ帳に移す。週の学びを1枚の図にまとめる。" },
};

// ── storage（Safari の localStorage は永続） ──────────────────────────────────
function dateKey(y,m,d){ return `${y}-${m+1}-${d}`; }
function todayKey(){ const n=new Date(); return dateKey(n.getFullYear(),n.getMonth(),n.getDate()); }

function loadDay(key){
  try{ const r=localStorage.getItem(`cl_${key}`); return r?JSON.parse(r):null; }catch{ return null; }
}
function saveDay(key,data){
  try{ localStorage.setItem(`cl_${key}`,JSON.stringify(data)); }catch{}
}

function calcProgress(checks,phase){
  const sites=[...SITES_ALWAYS,...(phase>=2?SITES_P2:[]),...(phase>=3?SITES_P3:[])];
  const tasks=PHASE_TASKS[phase]||[];
  const total=DAILY_ROUTINE.length+sites.length+tasks.length;
  const done=DAILY_ROUTINE.filter(r=>checks[r.id]).length
            +sites.filter((_,i)=>checks[`site_${i}`]).length
            +tasks.filter((_,i)=>checks[`p${phase}_t${i}`]).length;
  return total?Math.round((done/total)*100):0;
}

function pctColor(pct){
  if(pct===0) return null;
  if(pct<40)  return "#FF4D0066";
  if(pct<70)  return "#FFB80088";
  if(pct<100) return "#0057FF99";
  return "#00A550";
}

// ── CheckItem ─────────────────────────────────────────────────────────────────
function CheckItem({id,label,sub,color="#888",checked,onChange,readOnly}){
  return(
    <div onClick={()=>!readOnly&&onChange(id,!checked)} style={{
      display:"flex",alignItems:"flex-start",gap:10,padding:"9px 12px",
      background:checked?(color+"0f"):"#0D0D0D",
      border:`1px solid ${checked?color+"44":"#1a1a1a"}`,
      borderRadius:7,cursor:readOnly?"default":"pointer",
      transition:"all 0.15s",opacity:checked?0.6:1,
    }}>
      <div style={{
        width:17,height:17,borderRadius:4,border:`2px solid ${checked?color:"#333"}`,
        background:checked?color:"transparent",flexShrink:0,marginTop:1,
        display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",
      }}>
        {checked&&<span style={{fontSize:10,color:"#000",fontWeight:900}}>✓</span>}
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:700,color:checked?"#555":"#E0DDD8",textDecoration:checked?"line-through":"none",marginBottom:sub?2:0}}>{label}</div>
        {sub&&<div style={{fontSize:10,color:"#555",lineHeight:1.5}}>{sub}</div>}
      </div>
    </div>
  );
}

// ── Collapsible ───────────────────────────────────────────────────────────────
function Collapsible({title,sub,color="#444",children,defaultOpen=true}){
  const[open,setOpen]=useState(defaultOpen);
  return(
    <div style={{marginBottom:13}}>
      <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:8,marginBottom:open?7:0,cursor:"pointer",padding:"3px 0"}}>
        <div style={{width:3,height:13,background:color,borderRadius:2,flexShrink:0}}/>
        <div style={{flex:1}}>
          <span style={{fontSize:11,fontWeight:900,color:"#E0DDD8"}}>{title}</span>
          {sub&&<span style={{fontSize:9,color:"#444",marginLeft:8,letterSpacing:"0.1em"}}>{sub}</span>}
        </div>
        <span style={{fontSize:9,color:"#333"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&<div style={{display:"flex",flexDirection:"column",gap:5}}>{children}</div>}
    </div>
  );
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function Calendar({onSelectDay,selectedKey}){
  const today=new Date();
  const[vy,setVy]=useState(today.getFullYear());
  const[vm,setVm]=useState(today.getMonth());

  const firstDow=new Date(vy,vm,1).getDay();
  const dim=new Date(vy,vm+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);

  const prev=()=>{ if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1); };
  const next=()=>{ if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1); };

  const isToday=(d)=>d===today.getDate()&&vm===today.getMonth()&&vy===today.getFullYear();
  const isFuture=(d)=>new Date(vy,vm,d)>today;

  const MONTHS=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const WDAYS=["日","月","火","水","木","金","土"];

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button onClick={prev} style={{background:"transparent",border:"1px solid #1e1e1e",color:"#555",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:14}}>‹</button>
        <span style={{fontSize:14,fontWeight:900}}>{vy}年 {MONTHS[vm]}</span>
        <button onClick={next} style={{background:"transparent",border:"1px solid #1e1e1e",color:"#555",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:14}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:5}}>
        {WDAYS.map((w,i)=>(
          <div key={w} style={{textAlign:"center",fontSize:9,fontWeight:700,color:i===0?"#FF4D0055":i===6?"#0057FF55":"#2a2a2a",padding:"3px 0"}}>{w}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((d,i)=>{
          if(!d) return <div key={`e${i}`}/>;
          const key=dateKey(vy,vm,d);
          const data=loadDay(key);
          const pct=data?calcProgress(data.checks||{},data.phase||1):0;
          const bg=data&&pct>0?pctColor(pct):null;
          const isSel=key===selectedKey;
          const future=isFuture(d);
          const isTod=isToday(d);
          return(
            <div key={key} onClick={()=>!future&&onSelectDay(key)} style={{
              aspectRatio:"1",borderRadius:7,display:"flex",flexDirection:"column",
              alignItems:"center",justifyContent:"center",
              background:isSel?"#E0DDD818":bg||"#0D0D0D",
              border:isSel?"1px solid #E0DDD855":isTod?"1px solid #FF4D0077":"1px solid #111",
              cursor:future?"default":"pointer",opacity:future?0.2:1,transition:"all 0.12s",
            }}>
              <span style={{fontSize:11,fontWeight:isTod?900:500,color:isTod?"#FF4D00":bg?"#E0DDD8":"#444"}}>{d}</span>
              {data&&pct>0&&<div style={{width:"55%",height:2,borderRadius:1,background:pctColor(pct),marginTop:2}}/>}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:12,marginTop:11,flexWrap:"wrap"}}>
        {[["#FF4D0066","1〜39%"],["#FFB80088","40〜69%"],["#0057FF99","70〜99%"],["#00A550","100%"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:9,height:9,borderRadius:2,background:c}}/>
            <span style={{fontSize:9,color:"#444"}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── DayDetail ─────────────────────────────────────────────────────────────────
function DayDetail({dayKey,onClose}){
  const data=loadDay(dayKey);
  const[y,m,d]=dayKey.split("-").map(Number);
  const dow=new Date(y,m-1,d).getDay();
  const WDAYS=["日","月","火","水","木","金","土"];
  const dateStr=`${y}/${m}/${d}（${WDAYS[dow]}）`;

  if(!data){
    return(
      <div style={{textAlign:"center",padding:"20px 0"}}>
        <div style={{fontSize:32,marginBottom:10}}>📭</div>
        <div style={{fontSize:11,color:"#333",marginBottom:16}}>この日の記録はありません</div>
        <button onClick={onClose} style={{padding:"7px 18px",background:"transparent",border:"1px solid #222",color:"#555",borderRadius:7,cursor:"pointer",fontSize:11}}>閉じる</button>
      </div>
    );
  }

  const ph=data.phase||1;
  const phaseObj=PHASES.find(p=>p.id===ph);
  const pColor=phaseObj?.color||"#FF4D00";
  const sites=[...SITES_ALWAYS,...(ph>=2?SITES_P2:[]),...(ph>=3?SITES_P3:[])];
  const tasks=PHASE_TASKS[ph]||[];
  const pct=calcProgress(data.checks||{},ph);
  const chk=data.checks||{};
  const routineDone=DAILY_ROUTINE.filter(r=>chk[r.id]).length;
  const sitesDone=sites.filter((_,i)=>chk[`site_${i}`]).length;
  const tasksDone=tasks.filter((_,i)=>chk[`p${ph}_t${i}`]).length;

  return(
    <div>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12}}>
        <div>
          <div style={{fontSize:14,fontWeight:900,marginBottom:2}}>{dateStr}</div>
          <div style={{fontSize:9,color:pColor,fontWeight:700}}>{phaseObj?.label} — {phaseObj?.theme}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:24,fontWeight:900,color:pct===100?"#00A550":pColor,lineHeight:1}}>{pct}%</div>
          <button onClick={onClose} style={{fontSize:9,color:"#444",background:"transparent",border:"none",cursor:"pointer",marginTop:4,padding:0}}>✕ 閉じる</button>
        </div>
      </div>
      <div style={{height:4,background:"#151515",borderRadius:2,overflow:"hidden",marginBottom:14}}>
        <div style={{height:"100%",width:`${pct}%`,background:pct===100?"#00A550":pColor,borderRadius:2}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:16}}>
        {[
          {label:"ルーティン",done:routineDone,total:DAILY_ROUTINE.length,color:"#FFB800"},
          {label:"参考サイト",done:sitesDone,total:sites.length,color:"#FF4D00"},
          {label:"フェーズタスク",done:tasksDone,total:tasks.length,color:pColor},
        ].map(s=>(
          <div key={s.label} style={{padding:"8px 10px",background:"#111",border:`1px solid ${s.color}22`,borderRadius:7,textAlign:"center"}}>
            <div style={{fontSize:14,fontWeight:900,color:s.done===s.total?s.color:"#E0DDD8"}}>{s.done}<span style={{fontSize:9,color:"#444"}}>/{s.total}</span></div>
            <div style={{fontSize:9,color:"#444",marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:9,color:"#444",letterSpacing:"0.15em",fontWeight:700,marginBottom:5}}>ルーティン</div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {DAILY_ROUTINE.map(r=>(
            <CheckItem key={r.id} id={r.id} label={`${r.time}　${r.label}`} color={r.color} checked={!!chk[r.id]} readOnly/>
          ))}
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:9,color:"#444",letterSpacing:"0.15em",fontWeight:700,marginBottom:5}}>参考サイト</div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {sites.map((s,i)=>(
            <CheckItem key={i} id={`site_${i}`} label={`${s.icon} ${s.name}`} color={s.color} checked={!!chk[`site_${i}`]} readOnly/>
          ))}
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:9,color:"#444",letterSpacing:"0.15em",fontWeight:700,marginBottom:5}}>フェーズタスク ({phaseObj?.label})</div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {tasks.map((t,i)=>(
            <CheckItem key={i} id={`p${ph}_t${i}`} label={t} color={pColor} checked={!!chk[`p${ph}_t${i}`]} readOnly/>
          ))}
        </div>
      </div>
      {data.note?(
        <div style={{padding:"10px 13px",background:"#111",border:"1px solid #1a1a1a",borderLeft:"3px solid #00A550",borderRadius:7}}>
          <div style={{fontSize:9,color:"#00A550",fontWeight:700,letterSpacing:"0.1em",marginBottom:5}}>TODAY'S LOG</div>
          <div style={{fontSize:11,color:"#888",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{data.note}</div>
        </div>
      ):(
        <div style={{padding:"10px 13px",background:"#0D0D0D",border:"1px solid #111",borderRadius:7,fontSize:11,color:"#333",textAlign:"center"}}>記録なし</div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const now=new Date();
  const weekday=now.getDay();
  const todayK=todayKey();

  const[tab,setTab]=useState("today");
  const[phase,setPhase]=useState(()=>{ try{return parseInt(localStorage.getItem("cl_phase")||"1");}catch{return 1;} });
  const[checks,setChecks]=useState({});
  const[note,setNote]=useState("");
  const[saved,setSaved]=useState(false);
  const[selKey,setSelKey]=useState(null);

  useEffect(()=>{
    const data=loadDay(todayK);
    if(data){ setChecks(data.checks||{}); setNote(data.note||""); }
    else{ setChecks({}); setNote(""); }
  },[]);

  useEffect(()=>{
    saveDay(todayK,{checks,note,phase});
    try{localStorage.setItem("cl_phase",String(phase));}catch{}
  },[checks,note,phase]);

  const toggle=(id,val)=>setChecks(prev=>({...prev,[id]:val}));

  const phaseObj=PHASES.find(p=>p.id===phase);
  const pColor=phaseObj?.color||"#FF4D00";
  const activeSites=[...SITES_ALWAYS,...(phase>=2?SITES_P2:[]),...(phase>=3?SITES_P3:[])];
  const phaseTasks=PHASE_TASKS[phase]||[];

  const routineDone=DAILY_ROUTINE.filter(r=>checks[r.id]).length;
  const sitesDone=activeSites.filter((_,i)=>checks[`site_${i}`]).length;
  const phaseTasksDone=phaseTasks.filter((_,i)=>checks[`p${phase}_t${i}`]).length;
  const totalItems=DAILY_ROUTINE.length+activeSites.length+phaseTasks.length;
  const doneItems=routineDone+sitesDone+phaseTasksDone;
  const progress=totalItems?Math.round((doneItems/totalItems)*100):0;

  const WL=["日","月","火","水","木","金","土"];
  const dateStr=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}（${WL[weekday]}）`;

  const handleSelectDay=(key)=>setSelKey(prev=>prev===key?null:key);

  const TabBtn=({id,label})=>(
    <button onClick={()=>setTab(id)} style={{
      flex:1,padding:"10px 0",
      background:tab===id?"#E0DDD80a":"transparent",
      border:`1px solid ${tab===id?"#2a2a2a":"#161616"}`,
      borderBottom:tab===id?"1px solid #080808":"1px solid #1a1a1a",
      color:tab===id?"#E0DDD8":"#3a3a3a",
      fontSize:11,fontWeight:700,cursor:"pointer",transition:"all 0.15s",
      borderRadius:"7px 7px 0 0",
    }}>{label}</button>
  );

  return(
    <div style={{minHeight:"100vh",background:"#080808",color:"#E0DDD8",fontFamily:"'Noto Sans JP','Hiragino Kaku Gothic Pro',sans-serif",paddingBottom:60}}>
      <div style={{maxWidth:520,margin:"0 auto",padding:"20px 16px 0"}}>

        <div style={{marginBottom:18}}>
          <div style={{fontSize:9,letterSpacing:"0.3em",color:"#222",fontWeight:700,marginBottom:4}}>DESIGN ROADMAP</div>
          <div style={{fontSize:17,fontWeight:900,letterSpacing:"-0.02em",marginBottom:8}}>{dateStr}</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{height:5,flex:1,background:"#111",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${progress}%`,background:pColor,borderRadius:3,transition:"width 0.3s"}}/>
            </div>
            <span style={{fontSize:13,fontWeight:900,color:progress===100?"#00A550":pColor,minWidth:38,textAlign:"right"}}>{progress}%</span>
          </div>
          <div style={{fontSize:9,color:"#2a2a2a",marginTop:4}}>{doneItems} / {totalItems} 完了</div>
        </div>

        <div style={{display:"flex",gap:3}}>
          <TabBtn id="today" label="📋 今日のチェック"/>
          <TabBtn id="cal"   label="📅 カレンダー"/>
        </div>
        <div style={{borderBottom:"1px solid #1a1a1a",marginBottom:18}}/>

        {tab==="today"&&(
          <div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:9,color:"#222",letterSpacing:"0.2em",fontWeight:700,marginBottom:7}}>CURRENT PHASE</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {PHASES.map(p=>(
                  <button key={p.id} onClick={()=>setPhase(p.id)} style={{
                    padding:"5px 9px",borderRadius:6,cursor:"pointer",
                    border:`1px solid ${phase===p.id?p.color:"#1a1a1a"}`,
                    background:phase===p.id?p.color+"18":"transparent",
                    color:phase===p.id?p.color:"#444",
                    fontSize:10,fontWeight:700,transition:"all 0.15s",
                  }}>
                    <div style={{fontSize:8,opacity:0.6}}>{p.range}</div>
                    <div>{p.label}</div>
                  </button>
                ))}
              </div>
              <div style={{fontSize:10,color:pColor,marginTop:5,fontWeight:700}}>→ {phaseObj?.theme}</div>
            </div>

            <div style={{padding:"9px 13px",background:"#0D0D0D",border:`1px solid ${WEEKDAY_INFO[weekday].color}33`,borderLeft:`3px solid ${WEEKDAY_INFO[weekday].color}`,borderRadius:8,marginBottom:16,fontSize:11,color:"#777",lineHeight:1.7}}>
              <span style={{fontWeight:700,color:WEEKDAY_INFO[weekday].color}}>{WEEKDAY_INFO[weekday].label}：</span>
              {WEEKDAY_INFO[weekday].task}
            </div>

            <Collapsible title="2時間ルーティン" sub={`${routineDone}/${DAILY_ROUTINE.length}`} color="#FFB800">
              {DAILY_ROUTINE.map(r=>(
                <CheckItem key={r.id} id={r.id} label={`${r.time}　${r.label}`} sub={r.desc} color={r.color} checked={!!checks[r.id]} onChange={toggle}/>
              ))}
            </Collapsible>

            <Collapsible title="参考サイト　今日も開いたか" sub={`${sitesDone}/${activeSites.length}`} color="#FF4D00">
              {activeSites.map((s,i)=>(
                <CheckItem key={i} id={`site_${i}`} label={`${s.icon} ${s.name}`} sub={s.url} color={s.color} checked={!!checks[`site_${i}`]} onChange={toggle}/>
              ))}
            </Collapsible>

            <Collapsible title={`Phase ${phase} タスク`} sub={`${phaseTasksDone}/${phaseTasks.length}`} color={pColor}>
              {phaseTasks.map((t,i)=>(
                <CheckItem key={i} id={`p${phase}_t${i}`} label={t} color={pColor} checked={!!checks[`p${phase}_t${i}`]} onChange={toggle}/>
              ))}
            </Collapsible>

            <div style={{marginTop:4}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                <div style={{width:3,height:13,background:"#00A550",borderRadius:2}}/>
                <span style={{fontSize:11,fontWeight:900}}>今日の記録</span>
                <span style={{fontSize:9,color:"#2a2a2a",letterSpacing:"0.1em"}}>TODAY'S LOG</span>
              </div>
              <div style={{padding:"8px 12px",background:"#0D0D0D",border:"1px solid #1a1a1a",borderLeft:"3px solid #00A550",borderRadius:8,marginBottom:8}}>
                <div style={{fontSize:9,color:"#2a2a2a",marginBottom:5}}>① 今日やったこと　② 気づき　③ 明日確認すること</div>
                <textarea value={note} onChange={e=>setNote(e.target.value)}
                  placeholder={"① SANKOU!で飲食店LP10件を分析した\n② 余白が40%以上のサイトが高級感を持っていた\n③ 明日はFigmaで余白を再現してみる"}
                  style={{width:"100%",minHeight:110,background:"transparent",border:"none",outline:"none",color:"#E0DDD8",fontSize:12,lineHeight:1.8,resize:"vertical",fontFamily:"'Noto Sans JP','Hiragino Kaku Gothic Pro',sans-serif",boxSizing:"border-box",padding:0}}
                />
              </div>
              <button onClick={()=>{setSaved(true);setTimeout(()=>setSaved(false),1500);}} style={{width:"100%",padding:"11px",background:saved?"#00A55022":"#00A550",border:"1px solid #00A550",borderRadius:8,color:saved?"#00A550":"#000",fontSize:12,fontWeight:900,cursor:"pointer",transition:"all 0.2s",letterSpacing:"0.05em"}}>
                {saved?"✓ 記録した":"記録する（GoodNotesにも書くこと）"}
              </button>
            </div>
          </div>
        )}

        {tab==="cal"&&(
          <div>
            <Calendar onSelectDay={handleSelectDay} selectedKey={selKey}/>
            {selKey?(
              <div style={{marginTop:18,padding:"16px 14px",background:"#0D0D0D",border:"1px solid #1a1a1a",borderRadius:10}}>
                <DayDetail dayKey={selKey} onClose={()=>setSelKey(null)}/>
              </div>
            ):(
              <div style={{marginTop:16,padding:"14px",background:"#0D0D0D",border:"1px solid #111",borderRadius:10,textAlign:"center"}}>
                <div style={{fontSize:10,color:"#2a2a2a"}}>日付をタップすると、その日の記録が見られます</div>
              </div>
            )}
          </div>
        )}

        <div style={{marginTop:36,textAlign:"center",borderTop:"1px solid #0f0f0f",paddingTop:18}}>
          <div style={{fontSize:10,color:"#FF4D00",fontWeight:700,letterSpacing:"0.2em",marginBottom:6}}>FINAL MESSAGE</div>
          <div style={{fontSize:11,color:"#1e1e1e",lineHeight:2.2}}>分析した数がそのまま信頼になる。GoodNotesを閉じるな。</div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
